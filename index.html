<!DOCTYPE html>
<html>
<head>
    <title>Velvet Summer Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="countdown">

    <div>
        <span id="days">00</span>
        <p>Days</p>
    </div>

    <div>
        <span id="hours">00</span>
        <p>Hours</p>
    </div>

    <div>
        <span id="minutes">00</span>
        <p>Minutes</p>
    </div>

    <div>
        <span id="seconds">00</span>
        <p>Seconds</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
