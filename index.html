<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Velvet | Velvet Summer Countdown</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background">
    <video autoplay muted loop playsinline>
        <source src="assets/ocean.mp4" type="video/mp4">
    </video>
</div>

<div class="overlay"></div>

<main>

    <h2>ABOUT VELVET PRESENTS</h2>

    <h1>VELVET SUMMER</h1>

    <p class="date">
        August 3, 2026 • 6PM KST
    </p>


    <div class="countdown">

        <div>
            <span id="days">00</span>
            <p>Days</p>
        </div>

        <div>
            <span id="hours">00</span>
            <p>Hours</p>
        </div>

        <div>
            <span id="minutes">00</span>
            <p>Minutes</p>
        </div>

        <div>
            <span id="seconds">00</span>
            <p>Seconds</p>
        </div>

    </div>


    <div class="buttons">

        <a href="#" target="_blank">
            X / Twitter
        </a>

        <a href="#" target="_blank">
            YouTube
        </a>

        <a href="#" target="_blank">
            Streaming Guide
        </a>

    </div>


    <p class="footer">
        Made with 💜 by About Velvet
    </p>

</main>


<script src="script.js"></script>

</body>
</html>
